<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - E-Commerce Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-mesh">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
        <div class="aurora aurora-4"></div>
    </div>

    <header>
        <nav class="navbar">
            <h1>E-Commerce Store</h1>
            <ul class="nav-items">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="account.html">Account</a></li>
                <li class="admin-nav-item"><a href="admin.html">Admin</a></li>
                <button><a href="signup.html">Signup</a></button>
                <button><a href="signin.html">Signin</a></button>
                <li>
                    <button type="button" id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
                        <span class="theme-icon-wrap">
                            <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                            <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        </span>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1 class="page-title reveal">Checkout</h1>

            <div class="checkout-layout">
                <form onsubmit="handleCheckout(event)">
                    <fieldset class="checkout-fieldset">
                        <legend>Shipping Information</legend>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" name="lastName" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" name="address" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label for="city">City</label><input type="text" id="city" name="city" required></div>
                            <div class="form-group"><label for="state">State</label><input type="text" id="state" name="state" required></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label for="zip">ZIP Code</label><input type="text" id="zip" name="zip" required></div>
                            <div class="form-group"><label for="country">Country</label><input type="text" id="country" name="country" required></div>
                        </div>
                    </fieldset>

                    <fieldset class="checkout-fieldset">
                        <legend>Payment Information</legend>
                        <div class="form-group">
                            <label for="cardName">Cardholder Name</label>
                            <input type="text" id="cardName" name="cardName" required>
                        </div>
                        <div class="form-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label for="expiry">Expiry Date</label><input type="text" id="expiry" name="expiry" placeholder="MM/YY" required></div>
                            <div class="form-group"><label for="cvv">CVV</label><input type="text" id="cvv" name="cvv" placeholder="123" required></div>
                        </div>
                    </fieldset>

                    <button type="submit" class="btn btn-primary" style="padding: 14px 28px; font-size: 15px; width: 100%;">Place Order</button>
                </form>

                <div>
                    <div class="cart-summary" style="position: relative; top: 0;">
                        <h3>Order Summary</h3>
                        <div id="orderSummary" style="margin-top: 20px;"><p>Loading...</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 E-Commerce Store. All rights reserved.</p>
        <p>Email: support@ecommerce.com | Phone: (555) 123-4567</p>
    </footer>

    <div id="toast-container" style="position:fixed;top:84px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>
    <script src="script.js"></script>
    <script>
        function displayOrderSummary() {
            const summary = document.getElementById('orderSummary');
            if (cart.length === 0) {
                summary.innerHTML = '<p>Your cart is empty</p>';
                return;
            }
            const total = getCartTotal();
            const tax = (total * 0.1).toFixed(2);
            const shipping = 10;
            const grandTotal = (total + parseFloat(tax) + shipping).toFixed(2);
            summary.innerHTML = `
                <div>
                    ${cart.map(item => `
                        <div class="checkout-summary-item">
                            <span>${item.name} x ${item.quantity}</span>
                            <span>$${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `).join('')}
                    <div class="summary-row">Subtotal: $${total.toFixed(2)}</div>
                    <div class="summary-row">Tax (10%): $${tax}</div>
                    <div class="summary-row">Shipping: $${shipping.toFixed(2)}</div>
                    <div class="summary-row total">Total: $${grandTotal}</div>
                </div>
            `;
        }
        displayOrderSummary();
    </script>
</body>
</html>
