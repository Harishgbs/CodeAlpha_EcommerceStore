<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - E-Commerce Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>E-Commerce Store</h1>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Shopping Cart</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="account.html">Account</a></li>
                <button><a href="signup.html">Signup</a></button>
                <button><a href="signin.html">Signin</a></button>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Checkout</h1>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                <form onsubmit="handleCheckout(event)">
                    <fieldset style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                        <legend style="padding: 0 10px; font-size: 18px; font-weight: 600;">Shipping Information</legend>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" name="lastName" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" name="address" required>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" required>
                            </div>
                            <div class="form-group">
                                <label for="state">State</label>
                                <input type="text" id="state" name="state" required>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label for="zip">ZIP Code</label>
                                <input type="text" id="zip" name="zip" required>
                            </div>
                            <div class="form-group">
                                <label for="country">Country</label>
                                <input type="text" id="country" name="country" required>
                            </div>
                        </div>
                    </fieldset>

                    <fieldset style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                        <legend style="padding: 0 10px; font-size: 18px; font-weight: 600;">Payment Information</legend>
                        
                        <div class="form-group">
                            <label for="cardName">Cardholder Name</label>
                            <input type="text" id="cardName" name="cardName" required>
                        </div>

                        <div class="form-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label for="expiry">Expiry Date</label>
                                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" name="cvv" placeholder="123" required>
                            </div>
                        </div>
                    </fieldset>

                    <button type="submit" class="btn" style="padding: 15px 30px; font-size: 16px; width: 100%;">Place Order</button>
                </form>

                <div>
                    <div class="cart-summary" style="position: relative; top: 0;">
                        <h3>Order Summary</h3>
                        <div id="orderSummary" style="margin-top: 20px;">
                            <p>Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 E-Commerce Store. All rights reserved.</p>
        <p>Email: support@ecommerce.com | Phone: (555) 123-4567</p>
    </footer>

    <script src="script.js"></script>
    <script>
        function displayOrderSummary() {
            const summary = document.getElementById('orderSummary');
            if (cart.length === 0) {
                summary.innerHTML = '<p>Your cart is empty</p>';
                return;
            }

            const total = getCartTotal();
            const tax = (total * 0.1).toFixed(2);
            const shipping = 10;
            const grandTotal = (total + parseFloat(tax) + shipping).toFixed(2);

            summary.innerHTML = `
                <div>
                    ${cart.map(item => `
                        <div style="padding: 10px 0; border-bottom: 1px solid #eee;">
                            <div style="display: flex; justify-content: space-between;">
                                <span>${item.name} x ${item.quantity}</span>
                                <span>$${(item.price * item.quantity).toFixed(2)}</span>
                            </div>
                        </div>
                    `).join('')}
                    <div class="summary-row">Subtotal: $${total.toFixed(2)}</div>
                    <div class="summary-row">Tax (10%): $${tax}</div>
                    <div class="summary-row">Shipping: $${shipping.toFixed(2)}</div>
                    <div class="summary-row total">Total: $${grandTotal}</div>
                </div>
            `;
        }

        displayOrderSummary();
    </script>
</body>
</html>
